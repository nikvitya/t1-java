version: '1.0'

services:

  postgres:
    image: postgres:11.13
    container_name: t1_15_demo
    ports:
      - "6543:5432"
    environment:
      - POSTGRES_DB=t1_15_demo
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=0000

  zookeeper_t1:
    image: confluentinc/cp-zookeeper:5.5.0
    hostname: zookeeper_t1
    container_name: zookeeper_t1
    ports:
      - "2182:2182"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2182
      ZOOKEEPER_TICK_TIME: 2000
  broker_t1:
    image: confluentinc/cp-kafka:5.5.0
    hostname: broker_t1
    container_name: broker_t1
    depends_on:
      - zookeeper_t1
    ports:
      - "29092:29092"
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper_t1:2182'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker_t1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0


  first-service:
    build: first-service/
    container_name: first-service
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - broker_t1
      - broker_2_t1
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/t1_demo
      - T1_KAFKA_BOOTSTRAP_SERVER=broker_t1:29092,broker_2_t1:29093

  second-service:
    build: second-service/
    container_name: second-service
    ports:
      - "8081:8081"
    depends_on:
      - postgres
      - broker_t1
      - broker_2_t1
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/t1_demo
      - T1_KAFKA_BOOTSTRAP_SERVER=broker_t1:29092,broker_2_t1:29093